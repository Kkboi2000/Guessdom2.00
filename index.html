<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#e8521a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Guessdom 2" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />
  <title>Guessdom 2</title>
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/settings.css" />
  <link rel="stylesheet" href="styles/menu.css" />
  <link rel="stylesheet" href="styles/setup.css" />
  <link rel="stylesheet" href="styles/game.css" />
</head>
<body>

<button id="settings-btn" aria-label="Settings">⚙️</button>

<div id="settings-overlay">
  <div id="settings-panel">
    <button class="settings-close" id="settings-close">✕</button>
    <h2 data-i18n="settings">Settings</h2>
    <div class="settings-row">
      <span class="settings-label" data-i18n="sound">Sound</span>
      <label class="toggle">
        <input type="checkbox" id="toggle-sound" />
        <span class="toggle-slider"></span>
      </label>
    </div>
    <div class="settings-row">
      <span class="settings-label" data-i18n="music">Music</span>
      <label class="toggle">
        <input type="checkbox" id="toggle-music" />
        <span class="toggle-slider"></span>
      </label>
    </div>
    <div class="settings-row">
      <span class="settings-label" data-i18n="language">Language</span>
      <div class="seg-control" id="lang-seg">
        <button class="seg-btn" data-val="en">EN</button>
        <button class="seg-btn" data-val="th">ไทย</button>
        <button class="seg-btn" data-val="jp">日本語</button>
      </div>
    </div>
    <div class="settings-row">
      <span class="settings-label" data-i18n="discardAnim">Discard Anim</span>
      <div class="seg-control" id="anim-seg">
        <button class="seg-btn" data-val="cross"  data-i18n="cross">Cross</button>
        <button class="seg-btn" data-val="flip"   data-i18n="flip">Flip</button>
        <button class="seg-btn" data-val="delete" data-i18n="delete">Delete</button>
      </div>
    </div>
    <div class="settings-row">
      <span class="settings-label" data-i18n="textSize">Text Size</span>
      <div class="seg-control" id="desc-seg">
        <button class="seg-btn" data-val="small"  data-i18n="small">S</button>
        <button class="seg-btn" data-val="normal" data-i18n="normal">M</button>
        <button class="seg-btn" data-val="large"  data-i18n="large">L</button>
      </div>
    </div>
    <p class="settings-credit">Krit's vibe coding ✦ Guessdom 2</p>
  </div>
</div>

<div id="page-menu" class="page active">
  <img id="menu-bg"
       src="assets/backgrounds/menu-portrait.gif"
       data-portrait="assets/backgrounds/menu-portrait.gif"
       data-landscape="assets/backgrounds/menu-landscape.gif"
       class="page-bg responsive-bg" alt="" />
  <button id="start-btn" data-i18n="start">Start</button>
</div>

<div id="page-setup" class="page">
  <img id="setup-bg"
       src="assets/backgrounds/boardsetup-portrait.gif"
       data-portrait="assets/backgrounds/boardsetup-portrait.gif"
       data-landscape="assets/backgrounds/boardsetup-landscape.gif"
       class="page-bg responsive-bg" alt="" />
  <div class="setup-card">
    <h2 class="setup-title" data-i18n="boardSetup">Board Setup</h2>
    <div class="setup-field">
      <div class="setup-field-label" data-i18n="amount">Amount</div>
      <div class="setup-seg seg-3" id="amount-seg">
        <button class="setup-seg-btn"        data-val="mini"   data-i18n="mini">Mini (12)</button>
        <button class="setup-seg-btn active" data-val="normal" data-i18n="normal24">Normal (24)</button>
        <button class="setup-seg-btn"        data-val="big"    data-i18n="big">Big (36)</button>
      </div>
    </div>
    <div class="setup-field">
      <div class="setup-field-label" data-i18n="categories">Categories</div>
      <div class="setup-seg seg-5" id="cat-seg">
        <button class="setup-seg-btn active" data-val="people"     data-i18n="people">People</button>
        <button class="setup-seg-btn"        data-val="places"     data-i18n="places">Places</button>
        <button class="setup-seg-btn"        data-val="foods"      data-i18n="foods">Foods</button>
        <button class="setup-seg-btn"        data-val="animals"    data-i18n="animals">Animals</button>
        <button class="setup-seg-btn"        data-val="activities" data-i18n="activities">Activities</button>
      </div>
    </div>
    <button id="continue-btn" data-i18n="continue">Continue</button>
  </div>
</div>

<div id="page-game" class="page">
  <img id="game-bg"
       src="assets/backgrounds/game-portrait.gif"
       data-portrait="assets/backgrounds/game-portrait.gif"
       data-landscape="assets/backgrounds/game-landscape.gif"
       class="page-bg responsive-bg" alt="" />
  <div id="game-inner">
    <div id="section-select">
      <div class="card-grid" id="select-grid"></div>
      <div class="answer-section">
        <div class="answer-box" id="answer-preview">
          <div class="answer-box-empty">?</div>
        </div>
        <div class="btn-row">
          <button class="gd-btn btn-secondary" id="random-btn" data-i18n="random">Random</button>
          <button class="gd-btn btn-primary"   id="save-btn"   data-i18n="save" style="display:none">Save</button>
        </div>
      </div>
    </div>
    <div id="section-play">
      <div class="card-grid" id="play-grid"></div>
      <div class="answer-section">
        <div class="game-answer-box" id="game-answer-box">
          <img  class="game-answer-img"   id="game-answer-img"   src="" alt="" style="display:none" />
          <div  class="game-answer-label" id="game-answer-label" style="display:none"></div>
          <div  class="game-answer-cover" id="game-answer-cover">?</div>
        </div>
        <div class="game-controls">
          <button class="ctrl-btn" id="undo-btn"    title="Undo">↩</button>
          <button class="ctrl-btn" id="refresh-btn" title="Reset">⟳</button>
          <button class="ctrl-btn" id="lock-btn"    title="Lock flipped">🔒</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Home button -->
<button id="home-btn" aria-label="Home">☷</button>

<!-- How To Play button -->
<button id="tips-btn" aria-label="How to Play">ⓘ</button>

<!-- How To Play Modal -->
<div id="howto-overlay">
  <div id="howto-panel">
    <button id="howto-close" aria-label="Close">✕</button>
    <h2 id="howto-title" data-i18n="howToPlay">How to Play</h2>
    <div id="howto-steps">
      <div class="howto-step">
        <div class="howto-num">1.</div>
        <div class="howto-step-title" data-i18n="howTo1Title">Pick a Character and Save</div>
        <img class="howto-gif" src="assets/howto/howto1.gif" alt="Step 1" />
      </div>
      <div class="howto-step">
        <div class="howto-num">2.</div>
        <div class="howto-step-title" data-i18n="howTo2Title">Ask … Yes or No</div>
        <img class="howto-gif" src="assets/howto/howto2.gif" alt="Step 2" />
      </div>
      <div class="howto-step">
        <div class="howto-num">3.</div>
        <div class="howto-step-title" data-i18n="howTo3Title">Flip the Card as the Answer</div>
        <img class="howto-gif" src="assets/howto/howto3.gif" alt="Step 3" />
      </div>
    </div>
  </div>
</div>

<!-- Start animation overlay -->
<div id="start-overlay">
  <div id="start-anim-text"></div>
</div>

<!-- Confirm reset popup -->
<div id="confirm-overlay">
  <div id="confirm-box">
    <p id="confirm-msg"></p>
    <div class="confirm-btns">
      <button id="confirm-yes" data-i18n="yes">Yes</button>
      <button id="confirm-no"  data-i18n="no">No</button>
    </div>
  </div>
</div>

<script type="module" src="src/main.js"></script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    });
  }
</script>

<script>
  function swapBgs() {
    const isPortrait = window.matchMedia('(max-aspect-ratio: 1/1)').matches;
    document.querySelectorAll('.responsive-bg').forEach(img => {
      const src = isPortrait ? img.dataset.portrait : img.dataset.landscape;
      if (src && img.src !== new URL(src, location.href).href) img.src = src;
    });
  }
  swapBgs();
  window.addEventListener('resize', swapBgs);
  window.__swapBgs = swapBgs;
</script>

</body>
</html>
